name: support-ticket-triage
version: 1.0.0
description: |
  A real-world customer support ticket management environment where an AI agent
  must triage, categorize, prioritize, and respond to customer support tickets.
  The agent learns to efficiently handle support workflows with increasing complexity.

author: Meta Env Hackathon Participant
license: MIT

entry_point: env.py:SupportTicketEnv

tasks:
  - id: categorize_ticket
    name: Ticket Categorization (Easy)
    description: |
      Categorize incoming support tickets into the correct department and priority level.
      The agent must read the ticket content and assign appropriate category and priority.
    difficulty: easy
    max_steps: 5
    success_threshold: 0.7
    grader: env.TicketGrader:grade_categorization
    graders:
      - id: categorization_accuracy
        name: Categorization Accuracy
        description: Scores 0.0-1.0 whether ticket categories and priorities were correctly assigned.
        type: deterministic
        function_path: env.py:TicketGrader.grade_categorization

  - id: prioritize_and_route
    name: Prioritize and Route (Medium)
    description: |
      Handle multiple tickets by prioritizing them correctly and routing to appropriate teams.
      The agent must manage a queue of tickets and make routing decisions.
    difficulty: medium
    max_steps: 10
    success_threshold: 0.6
    grader: env.TicketGrader:grade_escalation
    graders:
      - id: queue_prioritization
        name: Queue Prioritization
        description: Evaluates whether tickets were prioritized correctly in the queue.
        type: deterministic
        function_path: env.py:TicketGrader.grade_escalation

  - id: full_workflow
    name: Full Support Workflow (Hard)
    description: |
      Complete end-to-end support workflow: categorize, prioritize, draft responses,
      and escalate when necessary. The agent handles a realistic support scenario.
    difficulty: hard
    max_steps: 15
    success_threshold: 0.5
    grader: env.TicketGrader:grade_response
    graders:
      - id: workflow_resolution_quality
        name: Workflow Resolution Quality
        description: Grades the full workflow including categorization, prioritization, responses, and escalation.
        type: deterministic
        function_path: env.py:TicketGrader.grade_response
      - id: response_professionalism
        name: Response Professionalism
        description: Evaluates the tone, politeness, and professional formatting of agent responses.
        type: deterministic
        function_path: env.py:TicketGrader.grade_response

  - id: escalation_specialist
    name: Escalation Specialist (Medium)
    description: |
      Evaluate and route high-priority tickets to the correct specialized teams based on technical depth.
      Master the art of knowing when and how to escalate tickets for maximum effectiveness.
    difficulty: medium
    max_steps: 8
    success_threshold: 0.65
    grader: env.TicketGrader:grade_escalation
    graders:
      - id: escalation_precision
        name: Escalation Precision
        description: Measures accuracy of escalation decisions and appropriateness of team selection.
        type: deterministic
        function_path: env.py:TicketGrader.grade_escalation


environment:
  type: text
  observation_space:
    type: dict
    properties:
      tickets:
        type: array
        description: List of support tickets to handle
      current_step:
        type: integer
        description: Current step in the workflow
      queue_status:
        type: object
        description: Status of the ticket queue
  action_space:
    type: dict
    properties:
      action_type:
        type: string
        enum: [categorize, prioritize, respond, escalate, request_info, close]
      ticket_id:
        type: string
        description: ID of the ticket to act upon
      parameters:
        type: object
        description: Action-specific parameters

dependencies:
  python: ">=3.10"
  packages:
    - pydantic>=2.0.0
    - fastapi>=0.104.0
    - uvicorn>=0.24.0